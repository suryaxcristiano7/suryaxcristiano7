<svg width="520" height="90" viewBox="0 0 520 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="50%" stop-color="#0080FF"/>
      <stop offset="100%" stop-color="#FF4D4D"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="500" height="70" rx="35" fill="#0D1117" stroke="url(#btnGrad)" stroke-width="3" filter="url(#glow)">
    <animate attributeName="stroke-width" values="3;5;3" dur="2s" repeatCount="indefinite"/>
  </rect>

  <rect x="10" y="10" width="500" height="70" rx="35" fill="none" stroke="url(#btnGrad)" stroke-width="1" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.2s" repeatCount="indefinite"/>
  </rect>

  <text x="260" y="45" font-family="Fira Code, monospace" font-size="22" font-weight="700" fill="#00F0FF" text-anchor="middle">
    <tspan>🔓 ACCESS PORTFOLIO</tspan>
    <animate attributeName="fill" values="#00F0FF;#0080FF;#FF4D4D;#00F0FF" dur="4s" repeatCount="indefinite"/>
  </text>

  <text x="260" y="66" font-family="Fira Code, monospace" font-size="12" fill="#6E7681" text-anchor="middle" letter-spacing="2">
    suryaxcristiano.me
  </text>

  <circle cx="45" cy="45" r="4" fill="#00F0FF">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="475" cy="45" r="4" fill="#FF4D4D">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
